<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUS - Upcoming Matches</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Video Background -->
    <video class="video-background" autoplay muted loop>
        <source src="Game.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
    <!-- Navigation -->
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">
                    <div class="logo-text">CRUS LEGEND</div>
                </div>
                <button class="burger" id="burger-menu" type="button" aria-label="Toggle navigation" aria-expanded="false">
                    <span class="burger-bar"></span>
                    <span class="burger-bar"></span>
                    <span class="burger-bar"></span>
                </button>
                <ul class="nav-links" id="nav-links">
                    <li><a href="index.html" class="nav-link">HOME</a></li>
                    <li><a href="player.html" class="nav-link active" aria-current="page">PLAYER</a></li>
                    <li><a href="jersey.html" class="nav-link">JERSEY</a></li>
                    <li><a href="schedule.html" class="nav-link">SCHEDULE</a></li>
                    <li><a href="about.html" class="nav-link">ABOUT</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <section id="schedule" class="section active">
            <h2 style="text-align: center; margin-bottom: 3rem; color: #00ffff; font-size: 2.5rem;">COMING MATCHES</h2>
            
            <div class="matches-container">
                <!-- Match 1 -->
                <div class="match-card">
                  <div class="match-card-header">
                    <div>
                      <span class="label">Match day</span>
                      <span class="date">04 May 2026</span>
                    </div>
                    <span class="time">10:00 PM</span>
                  </div>
                  <div class="match-card-body">
                    <div class="teams-row">
                      <div class="team-block">
                        <span class="team-name">Crus Legend</span>
                        <span class="score">3</span>
                        <span class="badge badge-win">Winner</span>
                      </div>
                      <div class="vs-sep">:</div>
                      <div class="team-block">
                        <span class="team-name">Master Skert</span>
                        <span class="score dim">0</span>
                        <span class="badge badge-loss">Defeated</span>
                      </div>
                    </div>
                  </div>
                </div>

                <!-- Match 2 -->

            <div class="match-card">
              <div class="match-header">
                <span class="match-label">Match Day</span>
                <span class="match-time">10:00 PM</span>
              </div>
              <div class="date-bar">
                <span class="date-day">05</span>
                <span class="date-month">MAY 2026</span>
              </div>
              <div class="match-body">
                <div class="teams-grid">
                  <div class="team-block">
                    <div class="team-name">CRUS LEGEND</div>
                    <div class="team-score">0</div>
                    <span class="badge badge-win">???</span>
                  </div>
                  <div class="vs-dot">:</div>
                  <div class="team-block">
                    <div class="team-name">ROCKIE ROCKET</div>
                    <div class="team-score muted">0</div>
                    <span class="badge badge-loss">???</span>
                  </div>
                </div>
              </div>
            </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
